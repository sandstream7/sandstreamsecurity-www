<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sandstream Security</title>
<meta name="description" content="Secure infrastructure and adaptive defense systems.">

<style>
:root {
    --bg: #0b0d12;
    --fg: #e5e7eb;
    --muted: #9ca3af;
    --accent: #2563eb;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
}

.container {
    max-width: 640px;
    padding: 40px;
}

h1 {
    font-size: 2.6rem;
    font-weight: 600;
    margin-bottom: 10px;
    letter-spacing: 1px;
}

.tagline {
    color: var(--muted);
    margin-bottom: 30px;
    font-size: 1.1rem;
}

.divider {
    width: 70px;
    height: 2px;
    background: var(--accent);
    margin: 25px auto;
}

footer {
    margin-top: 40px;
    font-size: 0.85rem;
    color: var(--muted);
}

a {
    color: var(--accent);
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}
</style>
</head>
<body>
<div class="container">
    <h1>Sandstream Security</h1>
    <div class="divider"></div>
    <div class="tagline">
        Secure infrastructure.<br>
        Operational resilience.<br>
        Adaptive defense.
    </div>

    <footer>
        © 2026 Sandstream Seven LLC<br>
        <a href="mailto:contact@sandstreamsecurity.com">contact@sandstreamsecurity.com</a>
    </footer>
</div>
</body>
</html>
